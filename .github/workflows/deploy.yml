name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Check file sizes
        run: |
          FAIL=0
          while IFS= read -r -d '' f; do
            size=$(wc -c < "$f")
            if [ "$size" -gt 153600 ]; then
              echo "OVERSIZED: $f (${size} bytes > 150KB)"
              FAIL=1
            fi
          done < <(find src -name '*.vue' -print0)
          if [ "$FAIL" -eq 1 ]; then
            echo "Build blocked: split .vue files > 150KB before merging."
            exit 1
          fi
          echo "All .vue files within size limits."
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
